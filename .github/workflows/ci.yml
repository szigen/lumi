name: CI
on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
